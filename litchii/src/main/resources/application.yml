# src/main/resources/application.yml
spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

---
# Profil DEV
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5433/litchi
    username: litchi
    password: litchi_dev
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:4200,http://localhost:5173
  storage:
    path: ./uploads
  mailbox:
    ttl-days: 31


---
# Profil PROD
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}